<section class="SignUp">
    <div class="signup_card">

        <div class="signup_header">
            <p class="eyebrow">
                Already have an account?
                <a class="eyebrow_link" [routerLink]="'/sign-in'">Sign-in</a>
            </p>
            <h1 class="welcome_headline">Welcome back</h1>
            <p class="signup_sub">SignUp to get started</p>
        </div>

        <form class="signup_form" (ngSubmit)="onSubmit()" #signupForm="ngForm">

            <div class="field" [class.field-error]="emailError">
                <label class="field_label" for="email">Email address</label>
                <div class="field_wrap">
                    <input
                        id="email"
                        type="email"
                        class="field_input"
                        placeholder="you@example.com"
                        [(ngModel)]="email"
                        name="email"
                        required
                        (blur)="validateEmail()" />
                </div>
                <span class="field_error" *ngIf="emailError">{{ emailError
                    }}</span>
            </div>

            <div class="field" [class.field-error]="usernameError">
                <label class="field_label" for="name">Username</label>
                <div class="field_wrap">
                    <input
                        id="username"
                        class="field_input"
                        placeholder="Mohamed"
                        [(ngModel)]="username"
                        name="username"
                        required />
                </div>
                <span class="field_error" *ngIf="passwordError">{{ passwordError
                    }}</span>
            </div>

            <div class="field" [class.field-error]="passwordError">
                <label class="field_label" for="password">Password</label>
                <div class="field_wrap">
                    <input
                        id="password"
                        [type]="showPassword ? 'text' : 'password'"
                        class="field_input"
                        placeholder="••••••••"
                        [(ngModel)]="password"
                        name="password"
                        required />
                    <button type="button" class="field_toggle"
                        (click)="showPassword = !showPassword">
                        {{ showPassword ? 'Hide' : 'Show' }}
                    </button>
                </div>
                <span class="field_error" *ngIf="passwordError">{{ passwordError
                    }}</span>
            </div>

            <div class="signup_meta">
                <label class="checkbox">
                    <input type="checkbox" [(ngModel)]="rememberMe"
                        name="rememberMe" />
                    <span class="checkbox_mark"></span>
                    Remember me
                </label>
                <a href="/forgot-password" class="signup_forgot">Forgot
                    password?</a>
            </div>

            <div class="signup_alert" *ngIf="apiError">
                {{ apiError }}
            </div>

            <button type="submit" class="cta cta--primary signup_submit"
                [disabled]="isLoading">
                <span *ngIf="!isLoading">Sign up</span>
                <span *ngIf="isLoading" class="spinner"></span>
            </button>

        </form>

    </div>
</section>
