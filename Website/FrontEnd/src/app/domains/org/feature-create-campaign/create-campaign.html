<section class="create-campaign">
  <div class="create-campaign_card">

    <div class="create-campaign_header">
      <h1 class="welcome_headline">Create a campaign</h1>
      <p class="create-campaign_sub">
        Categories help donors filter by what they want to give.
      </p>
    </div>

    <form class="create-campaign_form" (ngSubmit)="onSubmit()" #campaignForm="ngForm">

      <div class="field">
        <label class="field_label" for="title">Campaign title</label>
        <div class="field_wrap">
          <input id="title" class="field_input" placeholder="New classroom for Al-Noor School"
            [(ngModel)]="title" name="title" required />
        </div>
      </div>

      <div class="field">
        <label class="field_label" for="description">Description</label>
        <div class="field_wrap">
          <textarea id="description" class="field_input field_textarea"
            placeholder="What is this campaign for?"
            [(ngModel)]="description" name="description" rows="4"></textarea>
        </div>
      </div>

      <!-- Category: Money vs Item, per diagram -->
      <div class="field">
        <label class="field_label">Category</label>
        <div class="category-toggle">
          <button type="button" class="category-option"
            [class.category-option--active]="category === 'money'"
            (click)="category = 'money'">
            Money
          </button>
          <button type="button" class="category-option"
            [class.category-option--active]="category === 'item'"
            (click)="category = 'item'">
            Item
          </button>
        </div>
      </div>

      @if (category === 'money') {
        <div class="field">
          <label class="field_label" for="goalAmount">Goal amount</label>
          <div class="field_wrap">
            <input id="goalAmount" type="number" class="field_input" placeholder="20000"
              [(ngModel)]="goalAmount" name="goalAmount" />
          </div>
        </div>
      }

      @if (apiError) {
        <div class="create-campaign_alert">{{ apiError }}</div>
      }

      <button type="submit" class="cta cta--primary create-campaign_submit" [disabled]="isLoading">
        <span>{{ isLoading ? 'Creating…' : 'Create campaign' }}</span>
      </button>

    </form>
  </div>
</section>
