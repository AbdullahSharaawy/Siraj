<section class="donated-items">
  <div class="container">

    <header class="donated-items_header">
      <h1 class="donated-items_title">Donated items</h1>
      <p class="donated-items_sub">Track items you've donated and their status.</p>
    </header>

    <!-- Worker-only controls: "If worker" branch from the diagram -->
    @if (isWorker) {
      <div class="worker-panel">
        <p class="worker-panel_label">Worker tools</p>
        <button class="cta cta--secondary" (click)="askForDonatedItems()">
          Ask for donated items
        </button>
      </div>
    }

    <div class="items-list">
      @for (item of items; track item.id) {
        <div class="item-card">
          <div class="item-card_body">
            <p class="item-card_name">{{ item.name }}</p>
            <p class="item-card_donor">from {{ item.donorName }}</p>
            <span class="item-status" [class]="'item-status--' + item.status">
              {{ item.status }}
            </span>
          </div>

          @if (isWorker) {
            <div class="item-card_actions">
              <button class="cta cta--secondary" (click)="confirmDonatedItem(item)">
                Confirm
              </button>
              <button class="cta cta--primary" (click)="markReceived(item)">
                Received
              </button>
            </div>
          }
        </div>
      } @empty {
        <p class="items-empty">No donated items yet.</p>
      }
    </div>

  </div>
</section>
