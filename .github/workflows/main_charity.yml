# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - Charity

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build with dotnet
        run: dotnet build --configuration Release
        
      - name: Install dotnet-ef tool
        run: dotnet tool install --global dotnet-ef

      - name: Run Entity Framework Migrations
        # استبدل YourProjectName.csproj باسم ملف مشروعك الحقيقي
        run: dotnet ef database update --project TheCharityDAL/TheCharityDAL.csproj --startup-project TheCharityPL/TheCharityPL.csproj --connection "${{ secrets.AZURE_SQL_CONNECTION_STRING }}"    
      - name: dotnet publish
        run: dotnet publish -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CBD2846B23A34731BE30F0D15A57621D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8FC5B8108AF74E188B1D17C3617AD4E7 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_174BB0F7A95748F183A822FDF4D912D5 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Charity'
          slot-name: 'Production'
          package: .
          
